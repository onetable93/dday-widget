<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Premium Date Studio v3.0</title>
<style>
:root{
--bg:#ffffff;--card:#f6f6f6;--text:#111;--sub:#666;--border:#e5e5e5;
}
@media (prefers-color-scheme: dark){
:root{--bg:#0f0f0f;--card:#181818;--text:#fff;--sub:#aaa;--border:#2a2a2a;}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:24px}
.container{max-width:900px;margin:auto}
.hero{text-align:center;margin-bottom:24px}
.hero h1{margin:0;font-size:42px;letter-spacing:-1px}
.hero p{color:var(--sub)}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.tab{padding:14px;border:1px solid var(--border);background:var(--card);border-radius:16px;cursor:pointer}
.panel{display:none;background:var(--card);border:1px solid var(--border);padding:24px;border-radius:24px}
.panel.active{display:block}
input{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text)}
button.action{width:100%;padding:14px;border:none;border-radius:12px;background:var(--text);color:var(--bg);font-weight:700;cursor:pointer}
.result{margin-top:20px;text-align:center}
.big{font-size:56px;font-weight:800}
.copy{margin-top:10px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text);cursor:pointer}
.footer{text-align:center;color:var(--sub);margin-top:30px;font-size:13px}
@media(max-width:700px){.tabs{grid-template-columns:1fr 1fr}.big{font-size:42px}}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<h1>DATE STUDIO</h1>
<p>날짜를 계산하는 가장 쉬운 방법</p>
</div>

<div class="tabs">
<button class="tab" onclick="show(0)">📅 D-Day</button>
<button class="tab" onclick="show(1)">❤️ 기념일</button>
<button class="tab" onclick="show(2)">🎉 100일</button>
<button class="tab" onclick="show(3)">🗓️ 날짜계산</button>
</div>

<div class="panel active">
<input id="event" placeholder="이벤트명">
<input id="ddayDate" type="date">
<button class="action" onclick="calcDday()">계산하기</button>
<div class="result"><div id="ddayResult" class="big">D-DAY</div></div>
</div>

<div class="panel">
<input id="annivDate" type="date">
<button class="action" onclick="calcAnniv()">계산하기</button>
<div class="result"><div id="annivResult" class="big">0일째</div></div>
</div>

<div class="panel">
<input id="hundredDate" type="date">
<button class="action" onclick="calc100()">계산하기</button>
<div class="result"><div id="hundredResult" class="big">100일</div></div>
</div>

<div class="panel">
<input id="baseDate" type="date">
<input id="plusDays" type="number" placeholder="더할 일수">
<button class="action" onclick="calcDate()">계산하기</button>
<div class="result"><div id="dateResult" class="big">날짜</div></div>
</div>

<div class="footer">
D-Day 계산기 · 기념일 계산기 · 100일 계산기 · 날짜 계산기
</div>
</div>

<script>
function show(i){
document.querySelectorAll('.panel').forEach((p,n)=>p.classList.toggle('active',n===i));
}
function copyText(text){navigator.clipboard.writeText(text);alert('복사되었습니다');}

function calcDday(){
const d=document.getElementById('ddayDate').value;
const e=document.getElementById('event').value||'이벤트';
if(!d)return;
localStorage.setItem('event',e);
localStorage.setItem('ddayDate',d);
const diff=Math.ceil((new Date(d)-new Date())/86400000);
const txt=e+'\n'+(diff>=0?'D-'+diff:'D+'+Math.abs(diff));
document.getElementById('ddayResult').innerText=txt;
}

function calcAnniv(){
const d=new Date(document.getElementById('annivDate').value);
const days=Math.floor((new Date()-d)/86400000)+1;
const txt='오늘은 '+days+'일째';
document.getElementById('annivResult').innerText=txt;
}

function calc100(){
const d=new Date(document.getElementById('hundredDate').value);
d.setDate(d.getDate()+100);
document.getElementById('hundredResult').innerText=d.toLocaleDateString('ko-KR');
}

function calcDate(){
const d=new Date(document.getElementById('baseDate').value);
d.setDate(d.getDate()+parseInt(document.getElementById('plusDays').value||0));
document.getElementById('dateResult').innerText=d.toLocaleDateString('ko-KR');
}

window.onload=()=>{
const e=localStorage.getItem('event');
const d=localStorage.getItem('ddayDate');
if(e) document.getElementById('event').value=e;
if(d) document.getElementById('ddayDate').value=d;
}
</script>
</body>
</html>
