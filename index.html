<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>올인원 날짜 계산기</title>
<style>
:root{--bg:#f5f7fb;--card:rgba(255,255,255,.8);--text:#111}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:rgba(30,41,59,.8);--text:#fff}}
body{font-family:sans-serif;background:var(--bg);color:var(--text);padding:20px}
.card{max-width:900px;margin:auto;background:var(--card);backdrop-filter:blur(16px);padding:20px;border-radius:20px}
.tabs button{margin:4px;padding:10px}
.panel{display:none}.panel.active{display:block}
input,button{padding:10px;margin:5px 0}
.result{font-size:24px;font-weight:bold}
</style></head><body><div class='card'>
<h1>📅 올인원 날짜 계산기</h1>
<div class='tabs'>
<button onclick='showTab(0)'>D-Day</button>
<button onclick='showTab(1)'>기념일</button>
<button onclick='showTab(2)'>100일</button>
<button onclick='showTab(3)'>날짜계산</button>
</div>
<div class='panel active'><input id='t' placeholder='이벤트명'><input id='d' type='date'><button onclick='dday()'>계산</button><div id='r1' class='result'></div></div>
<div class='panel'><input id='a' type='date'><button onclick='ann()'>계산</button><div id='r2' class='result'></div></div>
<div class='panel'><input id='b' type='date'><button onclick='c100()'>계산</button><div id='r3' class='result'></div></div>
<div class='panel'><input id='c' type='date'><input id='n' type='number' placeholder='일수'><button onclick='plusd()'>계산</button><div id='r4' class='result'></div></div>
</div>
<script>
function showTab(i){document.querySelectorAll('.panel').forEach((p,n)=>p.classList.toggle('active',n===i));}
function dday(){let x=document.getElementById('d').value;if(!x)return;let diff=Math.ceil((new Date(x)-new Date())/86400000);document.getElementById('r1').innerText=(document.getElementById('t').value||'이벤트')+' '+(diff>=0?'D-'+diff:'D+'+Math.abs(diff));}
function ann(){let d=new Date(document.getElementById('a').value);let days=Math.floor((new Date()-d)/86400000)+1;document.getElementById('r2').innerText='오늘은 '+days+'일째 ❤️';}
function c100(){let d=new Date(document.getElementById('b').value);d.setDate(d.getDate()+100);document.getElementById('r3').innerText='100일: '+d.toLocaleDateString('ko-KR');}
function plusd(){let d=new Date(document.getElementById('c').value);d.setDate(d.getDate()+parseInt(document.getElementById('n').value||0));document.getElementById('r4').innerText=d.toLocaleDateString('ko-KR');}
</script></body></html>
